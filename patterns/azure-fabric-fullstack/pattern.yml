# azure-fabric-fullstack pattern definition
# Stack: Web (React/TS) + API (Python/FastAPI) + Agents (Python/Microsoft Agent Framework)
# Data: Microsoft Fabric/OneLake + Azure AI Document Intelligence
# Platform: Azure Container Apps, Azure AI Foundry Agent Service, internal ACA WAF, Terraform, local azd deployment

name: "azure-fabric-fullstack"
description: |
  Full-stack Azure pattern with a React/TypeScript SPA frontend, a Python/FastAPI API,
  Python agent workflows built with Microsoft Agent Framework, Microsoft Fabric/OneLake
  data and analytics assets, Terraform infrastructure, and an internal-only
  nginx/ModSecurity OWASP CRS WAF running on Azure Container Apps.

  This pattern defines the reusable technology stack and deployment topology only. Product,
  domain, persona, workflow, sample-data, and business-outcome requirements belong in the
  generated project's requirements documents, not in this reusable pattern definition.

# Deployment model: "local-azd" (azd up from the harness) or "github-actions".
# local-azd is the default and supported model for this pattern.
deployment_model: "local-azd"

# Default Azure region for all regional resources (override in init.yml).
region: "centralus"

# Orchestrator-level (non specialist/critic) agents installed into the parent repo.
orchestrator_agents:
  - "e2e-tester"

children:
  - suffix: "waf"
    role: "waf"
    description: "Internal-only ACA-hosted nginx/ModSecurity WAF using OWASP CRS. Private IP only; routes approved internal traffic to web and API services for blast-radius control, not public ingress."
    stack: "Azure Container Apps / nginx / ModSecurity / OWASP Core Rule Set"

  - suffix: "web"
    role: "frontend"
    description: "React/TypeScript SPA for the project-defined user experience."
    stack: "TypeScript / React 18 / Vite / Vitest / Playwright"

  - suffix: "api"
    role: "backend"
    description: "Python/FastAPI REST API for application orchestration, Fabric/OneLake access, Document Intelligence coordination, agent dispatch/status, and health/version endpoints."
    stack: "Python 3.12 / FastAPI / pytest / Azure SDK / Fabric REST APIs"

  - suffix: "agents"
    role: "agent"
    description: "Python agent workflows coded with Microsoft Agent Framework and deployed to Azure AI Foundry Agent Service."
    stack: "Python 3.12 / Microsoft Agent Framework / Azure AI Foundry Agent Service / pytest"

  - suffix: "fabric"
    role: "worker"
    description: "Microsoft Fabric assets for OneLake landing, Lakehouse/Warehouse tables, eventing, semantic model, seed data, and analytics-ready structures."
    stack: "Microsoft Fabric / OneLake / Lakehouse / Warehouse / Data Factory pipelines / notebooks / semantic model"

  - suffix: "infra"
    role: "infra"
    description: "Terraform IaC for Azure resources: hub-linked spoke network, internal ACA environment, private WAF, ACR, Key Vault, managed identities, Foundry, Document Intelligence, Fabric connectivity, private endpoints, private DNS links, diagnostics, and RBAC."
    stack: "Terraform / azurerm provider / Azure Verified Modules / mcaps-infra-skills"

pattern_constraints:
  repository_model: |
    The harness is the parent/orchestrator repository. Child repositories are generated for
    WAF, web, API, agents, Fabric/data assets, and infrastructure. Project-specific names,
    descriptions, personas, workflow details, and acceptance criteria are supplied by the
    project's init-pattern and requirements documents.

  platform_deployment: |
    Deploy regional Azure resources to the configured region, defaulting to Central US. Use
    local Azure Developer CLI orchestration from the harness repository. The recommended
    deployment order is infrastructure -> Fabric workspace/items/seed data -> API -> agents
    -> web -> WAF -> private-path validation.

  application_stack: |
    The web child uses React/TypeScript. The API child uses Python/FastAPI. Containerized
    application components run on Azure Container Apps and publish health/version endpoints.
    Runtime behavior, UI screens, business entities, and workflow semantics are project
    requirements, not pattern requirements.

  fabric_platform: |
    Microsoft Fabric is the data and analytics platform for this stack. OneLake, Lakehouse,
    Warehouse, Data Factory pipelines, notebooks, Real-Time Intelligence/Eventstreams,
    Activator, User Data Functions, and semantic models may be used where supported by the
    project requirements and tenant capabilities.

    Fabric capacity/workspace ownership must be explicit in each generated project. The
    infrastructure repo owns capacity, workspace, private networking/private link, and RBAC
    where Terraform/provider support exists. The Fabric repo owns workspace items through
    Fabric REST/CLI/PowerShell or Terraform where provider support exists. Projects should
    state minimum Fabric capacity and feature requirements in their requirements documents.

  document_intelligence: |
    Azure AI Document Intelligence is part of the stack for projects that need document
    extraction. Model selection, extraction schemas, source citations, and confidence-handling
    rules are project requirements. First builds should prefer prebuilt models unless the
    project explicitly requires custom training.

  agent_platform: |
    Agents are coded in Python using Microsoft Agent Framework and deployed to Azure AI
    Foundry Agent Service. Use the guidance from
    https://learn.microsoft.com/en-us/agent-framework/get-started/ and
    https://devblogs.microsoft.com/foundry/foundry-agent-service-ga/.

    The agents repo owns Python agent definitions, prompts, tool contracts, deployment
    scripts, and tests. The API repo owns the default agent dispatch surface unless a project
    explicitly defines a different dispatch boundary. The model deployment should use a
    project-approved mini-class model where cost-sensitive demos are required.

  eventing_and_state: |
    Projects may use Fabric-native event-driven triggers through Real-Time Intelligence,
    Eventstreams, Activator, pipelines, notebooks, User Data Functions, or business events
    where supported. If native change notifications are unavailable for a required artifact,
    projects should use explicit domain events and work-queue rows in Fabric so processing is
    observable and replayable.

  networking: |
    Use a private-first hub-and-spoke network model. The application path uses an internal
    Azure Container Apps environment and internal ACA ingress behind the private WAF. The WAF
    is an internal blast-radius and inspection control, not an internet-facing ingress.

    Use private networking/private endpoints and hub-linked private DNS where supported for
    Azure Container Registry, Key Vault, Foundry, Document Intelligence, Fabric/OneLake access
    paths, monitoring, and supporting data-plane surfaces. Unsupported control-plane or SaaS
    paths must be documented as controlled outbound exceptions by each project.

    Backend services should not be directly reachable from outside the intended internal path.
    Projects should define WAF bypass prevention, private DNS behavior, demo/operator
    reachability, upload/body-size tuning, and WAF rule exclusions in their requirements.

  identity_and_security: |
    End-user authentication is project-specific. Azure service authentication uses managed
    identities, service principals where required, and Entra RBAC. Keep secrets out of source
    and code; use Key Vault where secrets are unavoidable.

  infrastructure: |
    Use Terraform only for infrastructure; do not use Bicep. Infrastructure work must use
    skills from https://github.com/hoopdad/mcaps-infra-skills, especially secure Azure
    Terraform, hub, and spoke skills. Keep reusable modules separate from workload-specific
    composition.

  quality_and_operations: |
    Each service exposes health and version endpoints, emits structured logs, runs as a
    non-root multi-stage container where containerized, and supports local lint, test, build,
    IaC validation, container scanning, and end-to-end smoke tests before deployment. The
    harness should own cross-service JSON Schema/OpenAPI contracts for shared data shapes.

# Skills installed into generated repos from the framework skills/ library.
# scope: parent | child | role:<role>  (role:* installs into matching child(ren))
# A skill may declare multiple scopes.
skills:
  - name: "container-app-troubleshoot"
    scope: ["parent", "child"]
  - name: "e2e-test"
    scope: ["parent"]
  - name: "route-flow-debug"
    scope: ["parent", "role:waf"]

  # Infra (Terraform / Azure) — vendored from hoopdad/mcaps-infra-skills.
  - name: "secure-azure-terraform-coder"
    scope: ["role:infra"]
  - name: "hub-skill"
    scope: ["role:infra"]
  - name: "spoke-skill"
    scope: ["role:infra", "parent"]
  - name: "defender-servers-skill"
    scope: ["role:infra"]

docs:
  - name: "agent-framework-get-started"
    description: "Microsoft Agent Framework getting started guide for building agents, tools, workflows, harnesses, memory, and hosting."
    url: "https://learn.microsoft.com/en-us/agent-framework/get-started/"
    local_path: "docs/agent-framework-get-started.md"

  - name: "foundry-agent-service-ga"
    description: "Azure AI Foundry Agent Service GA guidance, including Responses API-based runtime, private networking, tool connectivity, tracing, and evaluations."
    url: "https://devblogs.microsoft.com/foundry/foundry-agent-service-ga/"
    local_path: "docs/foundry-agent-service-ga.md"

  - name: "azure-fullstack-reference-pattern"
    description: "Reference pattern used as the structural source for this Azure Fabric full-stack pattern."
    url: "https://raw.githubusercontent.com/hoopdad/enterprise-copilot-fleet-controller/main/patterns/azure-fullstack/pattern.yml"
    local_path: "patterns/azure-fullstack/pattern.yml"
